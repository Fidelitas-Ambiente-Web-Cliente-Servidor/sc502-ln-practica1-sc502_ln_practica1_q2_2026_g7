<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurante Mi Sabor</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="text-center py-5">
    <h1>Restaurante Mi Sabor</h1>
    <p class="lead">Tu Mejor Experiencia</p>
  </header>

  <main class="container my-4">
    <div class="row">
      
      <section class="col-lg-6 mb-5">
        <h2 class="section-title">Nuestro Menú</h2>
        
        <div class="d-flex flex-wrap gap-2 justify-content-center mb-4">
          <button id="btn-Todos" class="btn-filtro activo" onclick="filtrarCategoria('Todos')">Todos</button>
          <button id="btn-Entrada" class="btn-filtro" onclick="filtrarCategoria('Entrada')">Entradas</button>
          <button id="btn-PlatoFuerte" class="btn-filtro" onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
          <button id="btn-Postre" class="btn-filtro" onclick="filtrarCategoria('Postre')">Postres</button>
        </div>

        <div id="contenedor-menu" class="row g-3"></div>
      </section>

      <section class="col-lg-6">
        <h2 class="section-title">Reservar una Mesa</h2>
        
        <form id="form-reserva" novalidate class="mb-5">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre Completo</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ej. Carlos Estrada" />
            <div id="error-nombre" class="error-campo"></div>
          </div>

          <div class="mb-3">
            <label for="correo" class="form-label">Correo Electrónico</label>
            <input type="email" id="correo" class="form-control" placeholder="carlos@correo.com" />
            <div id="error-correo" class="error-campo"></div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="fecha" class="form-label">Fecha de Reserva</label>
              <input type="date" id="fecha" class="form-control" />
              <div id="error-fecha" class="error-campo"></div>
            </div>
            <div class="col-md-6 mb-3">
              <label for="hora" class="form-label">Hora</label>
              <select id="hora" class="form-select">
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label for="personas" class="form-label">Número de Personas</label>
            <input type="number" id="personas" class="form-control" min="1" max="20" placeholder="1 a 20 personas" />
            <div id="error-personas" class="error-campo"></div>
          </div>

          <div class="mb-3">
            <label for="comentarios" class="form-label">Comentarios (Opcional)</label>
            <textarea id="comentarios" class="form-control" rows="3" placeholder="Notas especiales..."></textarea>
          </div>

          <button type="submit" id="btn-submit" class="btn btn-primary w-100" disabled>Confirmar Reserva</button>
        </form>

        <h3 class="mt-4 mb-3">Reservas Registradas</h3>
        <div class="table-responsive">
          <table class="table table-bordered align-middle">
            <thead class="table-dark">
              <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Personas</th>
              </tr>
            </thead>
            <tbody id="tabla-reservas-body">
              </tbody>
          </table>
        </div>

        <div id="resumen" class="resumen-reservas mt-4">
          </div>
      </section>

    </div>
  </main>

  <footer class="text-center py-4 bg-dark text-light mt-5">
    <p class="mb-0">2026 - Estudio de Caso #1</p>
  </footer>

  <script src="js/app.js"></script>

</body>
</html>
