<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Semana 5</title>
    <script src="./practicaSemana5.js"></script>
</head>
<body>

    <section id="calculadora">
        <h2>Calculadora</h2>
        <input type="number" id="num1" value="50" style="width: 80px;">
        <input type="number" id="num2" value="3" style="width: 80px;">
        
        <button id="btnSumar">+</button>
        <button id="btnRestar">-</button>
        <button id="btnMultiplicar">*</button>
        <button id="btnDividir">/</button>
        
        <p id="resultadoCalc" style="margin-top: 10px; font-weight: 500;">360</p>
    </section>

    <hr>

    <section id="contador">
        <h2>Contador</h2>
        <h3 id="valorContador" style="font-size: 1.5rem; margin: 5px 0;">0</h3>
        <button id="btnContar">Sumar</button>
    </section>

    <hr>

    <section id="imagenes">
        <h2>Cambiar Imagen</h2>
        <div style="margin-bottom: 15px;">
            <img id="imagenDinamica" src="https://a1.espncdn.com/combiner/i?img=%2Fphoto%2F2023%2F0314%2Fr1144381_1295x729_16%2D9.jpg" 
            alt="Mundial" style="width: 180px; display: block; margin-bottom: 10px;">
        </div>
        <button id="btnCambiarImagen">Cambiar Imagen</button>
    </section>

</body>
</html>
